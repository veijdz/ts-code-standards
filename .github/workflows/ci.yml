name: ci

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint, format:check, knip]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm ${{ matrix.task }}

  ci:
    name: ci
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "One or more checks failed (check job result: ${{ needs.check.result }})"
            exit 1
          fi
          echo "All checks passed"
