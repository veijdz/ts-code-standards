pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '**/*.{ts,tsx,mts,cts,js,jsx,mjs,cjs}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: '**/*.{ts,tsx,mts,cts,js,jsx,mjs,cjs,json,md,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    # No glob guard: a non-TS change (package.json bump, lockfile churn, type
    # augmentation in a .d.ts) can break the project-wide type graph, so the
    # whole-project check has to run every commit.
    typecheck:
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
